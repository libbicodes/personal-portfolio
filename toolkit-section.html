<section class="toolsec" id="tools">
  <span class="doodle ts-star" aria-hidden="true"><svg viewBox="0 0 24 24" shape-rendering="crispEdges"><rect x="10" y="0" width="4" height="24" fill="#F5C842"></rect><rect x="0" y="10" width="24" height="4" fill="#F5C842"></rect><rect x="6" y="6" width="3" height="3" fill="#F5C842"></rect><rect x="15" y="6" width="3" height="3" fill="#F5C842"></rect><rect x="6" y="15" width="3" height="3" fill="#F5C842"></rect><rect x="15" y="15" width="3" height="3" fill="#F5C842"></rect></svg></span>
  <span class="doodle ts-spark" aria-hidden="true"><svg viewBox="0 0 24 24" shape-rendering="crispEdges"><rect x="11" y="0" width="2" height="24" fill="#7E5BD0"></rect><rect x="0" y="11" width="24" height="2" fill="#7E5BD0"></rect><rect x="5" y="5" width="2" height="2" fill="#7E5BD0"></rect><rect x="17" y="5" width="2" height="2" fill="#7E5BD0"></rect><rect x="5" y="17" width="2" height="2" fill="#7E5BD0"></rect><rect x="17" y="17" width="2" height="2" fill="#7E5BD0"></rect></svg></span>

  <!-- ============================================================
       TOOLKIT — interactive pixel-art CRT desktop launcher
       A dimensional retro TV (drawn with shading, not transforms)
       holds 3 desktop folders. Click a folder -> it fills the screen
       and its tools fan out from the centre like a deck of cards.
       Click a card -> it enlarges to the centre (one at a time).
       Close (X / outside / Esc) resets everything cleanly.
       ============================================================ -->
  <div class="wrap">
    <h2 class="sec-title reveal">Toolkit</h2>
    <p class="sec-sub reveal">The tools I reach for, day to day &#8615; <span class="dt-hint">click a folder to open it</span></p>

    <div class="dt-stage reveal">
      <!-- ===== TOOLKIT CRT MONITOR ===== -->
      <div class="crt-tv">
        <span class="crt-antenna" aria-hidden="true"></span>
        <span class="crt-hi" aria-hidden="true"></span><!-- top highlight band -->

        <!-- front face: recessed screen + lower control base -->
        <div class="crt-face">
          <div class="crt-bezel">
            <div class="crt-screen" id="dtScreen">
              <!-- desktop chrome -->
              <div class="dt-topbar" aria-hidden="true">
                <span class="dt-os"><span class="dots"><i style="background:#F2913B"></i><i style="background:#F5C842"></i><i style="background:#5BE584"></i></span>&#9733; TOOLKIT.OS</span>
                <span class="dt-clock"><span class="dt-batt"></span> 10:24</span>
              </div>

              <!-- ===== TOOLKIT FOLDER SYSTEM (desktop) ===== -->
              <button class="dt-folder" data-folder="design" style="--tilt:-4deg;left:7%;top:26%"  aria-label="Open Design and Product folder, 7 tools">
                <span class="dt-folder-art" data-art="folder"></span>
                <span class="dt-badge" style="--bcol:var(--orange)">7</span>
                <span class="dt-folder-name">Design &amp; Product</span>
              </button>
              <button class="dt-folder" data-folder="data" style="--tilt:3deg;right:8%;top:23%"    aria-label="Open Data and Analytics folder, 7 tools">
                <span class="dt-folder-art" data-art="folder"></span>
                <span class="dt-badge" style="--bcol:var(--teal)">7</span>
                <span class="dt-folder-name">Data &amp; Analytics</span>
              </button>
              <button class="dt-folder" data-folder="cloud" style="--tilt:-2deg;left:35%;top:56%"   aria-label="Open Cloud and Foundations folder, 3 tools">
                <span class="dt-folder-art" data-art="folder"></span>
                <span class="dt-badge" style="--bcol:var(--purple)">3</span>
                <span class="dt-folder-name">Cloud &amp; Foundations</span>
              </button>

              <span class="dt-deskhint" aria-hidden="true">&#9656; pick a folder</span>

              <!-- expanded folder + card deck (filled by JS) -->
              <div class="dt-open" id="dtOpen" role="dialog" aria-modal="true" aria-label="Tool folder" hidden>
                <div class="dt-scrim" data-close></div>
                <div class="dt-open-head">
                  <span class="dt-open-ico" aria-hidden="true"></span>
                  <span class="dt-open-title" id="dtTitle"></span>
                  <span class="dt-open-count" id="dtCount"></span>
                  <button class="dt-close" id="dtClose" type="button" aria-label="Close folder">&#10005;</button>
                </div>
                <div class="dt-deck" id="dtDeck">
                  <div class="dt-fan" id="dtFan" role="list"></div>
                  <!-- card navigation arrows (shown while a folder is open) -->
                  <button class="dt-nav dt-prev" id="dtPrev" type="button" aria-label="Previous tool">&#9664;</button>
                  <button class="dt-nav dt-next" id="dtNext" type="button" aria-label="Next tool">&#9654;</button>
                  <span class="dt-tip" id="dtTip" aria-hidden="true">click a card or use &#9664; &#9654; to browse</span>
                </div>
              </div>
            </div>
          </div>

          <!-- lower control base: vents + dials -->
          <div class="crt-base" aria-hidden="true">
            <span class="crt-brand">LK&#8209;2000</span>
            <span class="crt-vents"></span>
            <span class="crt-dial"></span>
            <span class="crt-dial"></span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <style id="dt-style">
    /* taller section so the TV is a roomy centrepiece */
    #tools.toolsec{ padding-top:clamp(4.5rem,6vw,6rem); padding-bottom:clamp(5rem,8vw,7rem); }
    #tools .dt-hint{ font-family:var(--mono); font-size:18px; color:var(--teal); margin-left:6px;
      border:2px solid var(--ink); border-radius:20px; padding:1px 12px; background:var(--card);
      box-shadow:2px 2px 0 var(--ink); white-space:nowrap; }
    #tools .dt-stage{ position:relative; display:flex; justify-content:center; margin-top:34px; }

    /* ---------- CRT TV : a solid, shaded object (no 3D transforms) ---------- */
    /* ===== TOOLKIT SIZE / PROPORTION TWEAKS ===== shorter + wider CRT */
    #tools .crt-tv{ position:relative; width:min(960px,94%); box-sizing:border-box;
      background:var(--orange); border:6px solid var(--ink); border-radius:44px;
      padding:24px 38px 16px;
      /* volume via flat pixel shading: top highlight + right/bottom inner shade + hard ground shadow */
      box-shadow:
        inset 0 9px 0 rgba(255,255,255,.26),
        inset -10px 0 0 rgba(16,15,23,.07),
        inset 0 -12px 0 rgba(16,15,23,.13),
        18px 18px 0 var(--ink); }
    /* visible casing thickness — a darker orange back-block peeking on the right/bottom */
    #tools .crt-tv::before{ content:""; position:absolute; z-index:-1; left:16px; top:16px; right:-15px; bottom:-15px;
      background:#B5640C; border:6px solid var(--ink); border-radius:44px; }
    #tools .crt-hi{ position:absolute; left:40px; right:40px; top:16px; height:10px; border-radius:6px;
      background:#F9C57E; opacity:.8; pointer-events:none; }
    #tools .crt-antenna{ position:absolute; top:-52px; right:34%; width:4px; height:56px; background:var(--ink);
      transform:rotate(16deg); transform-origin:bottom center; }
    #tools .crt-antenna::after{ content:""; position:absolute; top:-10px; left:-5px; width:13px; height:13px;
      border-radius:50%; background:#F9C57E; border:3px solid var(--ink); }

    #tools .crt-face{ position:relative; }

    /* deep, recessed dark bezel around the glass */
    #tools .crt-bezel{ position:relative; background:#14131c; border:6px solid var(--ink); border-radius:26px;
      padding:16px;
      box-shadow:
        inset 6px 6px 0 rgba(0,0,0,.55),
        inset -4px -4px 0 rgba(255,255,255,.05),
        inset 0 0 0 2px #2a2740; }
    /* the CRT glass / desktop */
    #tools .crt-screen{ position:relative; aspect-ratio:1.78; border-radius:14px; overflow:hidden;
      border:3px solid #000; background:#CDEBE3; }
    /* curved-glass sheen (top-left lighter), scanlines + faint static, edge vignette */
    #tools .crt-screen::before{ content:""; position:absolute; inset:0; z-index:8; pointer-events:none;
      background:
        repeating-linear-gradient(0deg, rgba(16,15,23,.05) 0 2px, transparent 2px 4px),
        radial-gradient(rgba(255,255,255,.55) 1px, transparent 1px),
        radial-gradient(80% 62% at 22% 10%, rgba(255,255,255,.24) 0 12%, transparent 62%);
      background-size:100% 4px, 5px 5px, 100% 100%; opacity:.5; }
    #tools .crt-screen::after{ content:""; position:absolute; inset:0; z-index:9; pointer-events:none;
      border-radius:14px; box-shadow:inset 0 0 70px rgba(16,15,23,.4); }
    /* keep native pointer inside the screen (custom cursor + trail muted here) */
    #tools .crt-screen, #tools .crt-screen *{ cursor:default; }
    #tools .dt-folder, #tools .dt-card, #tools .dt-close{ cursor:pointer; }

    /* lower control base — a separate, slightly darker plane with a seam */
    #tools .crt-base{ position:relative; display:flex; align-items:center; gap:16px; margin-top:18px;
      padding:14px 18px; background:#E2820F; border:5px solid var(--ink); border-radius:18px;
      box-shadow:inset 0 6px 0 rgba(255,255,255,.16), inset 0 -7px 0 rgba(16,15,23,.16); }
    #tools .crt-brand{ font:700 16px var(--pixel); color:#5a3506; letter-spacing:.5px; white-space:nowrap; }
    #tools .crt-vents{ flex:1; height:30px; border:3px solid var(--ink); border-radius:7px; background:#7a4a10;
      background-image:repeating-linear-gradient(90deg, #C9700F 0 4px, #5a3506 4px 9px); }
    #tools .crt-dial{ width:30px; height:30px; border-radius:50%; background:#F9C57E; border:4px solid var(--ink);
      box-shadow:inset -3px -3px 0 rgba(16,15,23,.22); }

    /* desktop top bar */
    #tools .dt-topbar{ position:absolute; z-index:7; top:0; left:0; right:0; height:28px;
      background:var(--ink); color:var(--neon); display:flex; align-items:center; justify-content:space-between;
      padding:0 10px; font:700 13px var(--pixel); letter-spacing:.5px; }
    #tools .dt-os{ white-space:nowrap; display:inline-flex; align-items:center; }
    #tools .dt-topbar .dots{ display:inline-flex; gap:5px; vertical-align:-1px; margin-right:8px; }
    #tools .dt-topbar .dots i{ width:9px; height:9px; border-radius:50%; display:block; border:1px solid rgba(0,0,0,.35); }
    #tools .dt-clock{ display:inline-flex; align-items:center; gap:7px; color:#bdf7d2; }
    #tools .dt-batt{ width:18px; height:10px; border:2px solid #bdf7d2; border-radius:2px; position:relative; }
    #tools .dt-batt::before{ content:""; position:absolute; inset:1.5px; background:#bdf7d2; }
    #tools .dt-batt::after{ content:""; position:absolute; right:-4px; top:2px; width:2px; height:4px; background:#bdf7d2; }
    #tools .dt-deskhint{ position:absolute; z-index:4; right:12px; bottom:8px; font:700 13px var(--pixel);
      color:#0c5246; opacity:.6; }

    /* ---------- desktop folders ---------- */
    #tools .dt-folder{ position:absolute; z-index:3; display:flex; flex-direction:column; align-items:center;
      gap:8px; width:150px; padding:6px; background:none; border:none; color:var(--ink);
      transform:rotate(var(--tilt)); transition:transform .16s cubic-bezier(.2,.9,.3,1.2); }
    #tools .dt-folder:hover, #tools .dt-folder:focus-visible{ transform:rotate(0deg) translateY(-6px); outline:none; z-index:6; }
    #tools .dt-folder:active{ transform:rotate(0deg) translateY(-2px); }
    #tools .dt-folder-art{ position:relative; width:122px; height:102px; }
    #tools .dt-folder-art svg{ width:100%; height:100%; display:block; image-rendering:pixelated;
      filter:drop-shadow(4px 5px 0 rgba(16,15,23,.28)); }
    #tools .dt-folder:focus-visible .dt-folder-art{ outline:3px solid var(--cyan); outline-offset:3px; border-radius:4px; }
    #tools .dt-badge{ position:absolute; top:-6px; right:-2px; min-width:26px; height:26px; padding:0 6px;
      border-radius:50%; background:var(--bcol); border:3px solid var(--ink); color:var(--ink);
      font:700 14px var(--pixel); display:flex; align-items:center; justify-content:center;
      box-shadow:2px 2px 0 var(--ink); }
    #tools .dt-folder-name{ font:700 14px var(--pixel); line-height:1.05; text-align:center;
      background:var(--card); border:2.5px solid var(--ink); border-radius:6px; padding:3px 8px;
      box-shadow:2px 2px 0 var(--ink); max-width:144px; }

    /* ===== TOOL CARD DECK INTERACTIONS ===== */
    #tools .dt-open{ position:absolute; inset:0; z-index:20; display:flex; flex-direction:column;
      opacity:0; transform:scale(.5); transform-origin:50% 50%;
      transition:opacity .24s ease, transform .34s cubic-bezier(.2,.9,.3,1.2); }
    #tools .dt-open.show{ opacity:1; transform:scale(1); }
    #tools .dt-scrim{ position:absolute; inset:0; background:rgba(16,15,23,.6); cursor:pointer; }
    #tools .dt-open-head{ position:relative; z-index:3; display:flex; align-items:center; gap:10px; height:44px;
      flex:none; background:var(--accent,#F5C842); border-bottom:4px solid var(--ink); padding:0 12px; }
    #tools .dt-open-ico{ width:32px; height:27px; flex:none; display:block; }
    #tools .dt-open-title{ font:700 17px var(--pixel); color:var(--ink); white-space:nowrap; }
    #tools .dt-open-count{ font:15px var(--mono); color:rgba(16,15,23,.7); margin-right:auto; white-space:nowrap; }
    #tools .dt-close{ width:30px; height:30px; flex:none; border:3px solid var(--ink); border-radius:6px;
      background:var(--card); color:var(--ink); font:700 15px var(--pixel);
      display:flex; align-items:center; justify-content:center; box-shadow:2px 2px 0 var(--ink); }
    #tools .dt-close:hover{ background:var(--orange); }
    #tools .dt-close:active{ transform:translate(2px,2px); box-shadow:none; }

    /* deck fills the screen body; cards fan out from the centre */
    #tools .dt-deck{ position:relative; z-index:2; flex:1; }
    #tools .dt-fan{ position:absolute; inset:0; }
    #tools .dt-tip{ position:absolute; left:0; right:0; bottom:12px; text-align:center;
      font:15px var(--mono); color:#bdf7d2; opacity:.85; pointer-events:none; transition:opacity .2s; }
    #tools .dt-deck.has-active .dt-tip{ opacity:0; }

    /* ===== TOOL CARD ARROW NAVIGATION ===== */
    #tools .dt-nav{ position:absolute; top:calc(50% - 6px); transform:translateY(-50%); z-index:78;
      width:42px; height:42px; display:flex; align-items:center; justify-content:center;
      background:var(--card); color:var(--ink); border:3px solid var(--ink); border-radius:10px;
      font:700 15px var(--pixel); box-shadow:3px 3px 0 var(--ink); }
    #tools .dt-nav:hover{ background:var(--orange); transform:translateY(-50%) translate(-1px,-1px); box-shadow:4px 4px 0 var(--ink); }
    #tools .dt-nav:active{ transform:translateY(-50%) translate(2px,2px); box-shadow:1px 1px 0 var(--ink); }
    #tools .dt-nav:focus-visible{ outline:none; box-shadow:3px 3px 0 var(--ink), 0 0 0 3px var(--cyan); }
    #tools .dt-prev{ left:14px; }
    #tools .dt-next{ right:14px; }

    /* a tool card — collectible software card, centred + fanned via transform-origin */
    #tools .dt-card{ position:absolute; left:50%; top:50%; width:150px; height:188px;
      margin:-94px 0 0 -75px; box-sizing:border-box; transform-origin:50% 168%;
      transform:translateY(46px) scale(.5) rotate(0deg); opacity:0;
      background:var(--card); border:3px solid var(--ink); border-radius:13px;
      box-shadow:5px 6px 0 rgba(16,15,23,.5); display:flex; flex-direction:column; align-items:center;
      padding:12px 10px; transition:transform .42s cubic-bezier(.2,.9,.3,1.2), opacity .3s ease, box-shadow .16s; }
    /* fanned-out resting state (staggered emergence) */
    #tools .dt-fan.is-fanned .dt-card{ transform:rotate(var(--rot)); opacity:1;
      transition-delay:calc(var(--i) * 50ms); }
    /* ===== TOOLKIT CLICK-ONLY CARD SELECTION =====
       Hover is PURELY cosmetic: bring the card to the front (z-index) + outline it,
       but do NOT move/scale it. Changing geometry on hover made neighbours slide
       under the cursor and oscillate (the "going crazy" jitter). With no transform
       change the deck stays still; cards are selected by click / arrows / keyboard only. */
    #tools .dt-deck:not(.has-active) .dt-fan.is-fanned .dt-card:hover,
    #tools .dt-deck:not(.has-active) .dt-fan.is-fanned .dt-card:focus-visible{
      z-index:55; outline:none;
      box-shadow:7px 8px 0 rgba(16,15,23,.5), inset 0 0 0 3px var(--cyan); transition-delay:0s; }
    /* active card: enlarge + centre prominently, one at a time */
    #tools .dt-deck.has-active .dt-fan.is-fanned .dt-card{ opacity:.42; transform:rotate(var(--rot)) scale(.9);
      transition-delay:0s; }
    #tools .dt-deck.has-active .dt-fan.is-fanned .dt-card.is-active{ opacity:1; z-index:70;
      transform:translateY(-6px) rotate(0deg) scale(1.32); box-shadow:10px 12px 0 rgba(16,15,23,.55); }
    #tools .dt-card:focus-visible{ outline:none; box-shadow:8px 9px 0 rgba(16,15,23,.5), 0 0 0 3px var(--cyan); }

    #tools .dt-card .dt-pip{ position:absolute; display:flex; flex-direction:column; align-items:center;
      line-height:.85; font:700 11px var(--pixel); color:var(--pc,#16140E); }
    #tools .dt-card .dt-pip i{ font-style:normal; font-size:11px; margin-top:1px; }
    #tools .dt-card .dt-pip-tl{ top:8px; left:9px; }
    #tools .dt-card .dt-pip-br{ bottom:8px; right:9px; transform:rotate(180deg); }
    #tools .dt-card .dt-chip{ width:62px; height:62px; margin-top:14px; border:3px solid var(--ink);
      border-radius:11px; background:#fff; display:flex; align-items:center; justify-content:center;
      box-shadow:2px 2px 0 var(--ink); }
    #tools .dt-card .dt-chip svg{ width:40px; height:40px; image-rendering:pixelated; }
    #tools .dt-card .dt-name{ font:700 16px var(--pixel); color:var(--ink); margin-top:11px; text-align:center; line-height:1; }
    #tools .dt-card .dt-desc{ font:14px var(--mono); color:var(--ink2); text-align:center; line-height:1.05;
      margin-top:4px; padding:0 2px; }

    /* ===== TOOLKIT CURSOR TRAIL SUPPRESSION ===== */
    /* Suppress the trail with opacity (NOT display:none) so sprite animations keep
       running and self-remove normally — otherwise frozen sprites never fire
       animationend, the trail's live-counter never decrements, and it stalls. */
    body.dt-zone #cursorTrail{ opacity:0 !important; pointer-events:none !important; }

    /* ---------- responsive ---------- */
    @media (max-width:760px){
      #tools .crt-tv{ padding:22px 18px 16px; border-radius:32px; }
      #tools .dt-folder{ width:118px; }
      #tools .dt-folder-art{ width:92px; height:78px; }
      #tools .dt-folder-name{ font-size:12px; }
      #tools .dt-card{ width:128px; height:166px; margin:-83px 0 0 -64px; }
      #tools .dt-hint{ display:none; }
    }

    /* ---------- reduced motion ---------- */
    @media (prefers-reduced-motion: reduce){
      #tools .dt-open, #tools .dt-card, #tools .dt-folder, #tools .crt-antenna{ transition:none !important; }
      #tools .dt-fan.is-fanned .dt-card{ transition-delay:0s !important; }
    }
  </style>

  <script id="dt-script">
  (function(){
    "use strict";
    var screenEl = document.getElementById('dtScreen');
    if(!screenEl) return;
    var openEl  = document.getElementById('dtOpen');
    var deckEl  = document.getElementById('dtDeck');
    var fanEl   = document.getElementById('dtFan');
    var titleEl = document.getElementById('dtTitle');
    var countEl = document.getElementById('dtCount');

      + '<path d="M12 36 v-9 a4 4 0 0 1 4 -4 h26 a4 4 0 0 1 3.6 2.3 l3 6.7 H12 z" fill="#F5C842" stroke="#16140E" stroke-width="4" stroke-linejoin="round"/>'
      + '<rect x="12" y="36" width="100" height="58" rx="6" fill="#F5C842" stroke="#16140E" stroke-width="4"/>'
      + '<rect x="26" y="32" width="22" height="22" fill="#FBF8EE" stroke="#16140E" stroke-width="3"/>'
      + '<rect x="50" y="27" width="24" height="27" fill="#8FE0D2" stroke="#16140E" stroke-width="3"/>'
      + '<rect x="76" y="33" width="22" height="21" fill="#F6B86A" stroke="#16140E" stroke-width="3"/>'
      + '<path d="M8 52 h108 l-7 42 h-94 z" fill="#F8D269" stroke="#16140E" stroke-width="4" stroke-linejoin="round"/>'
      + '<rect x="20" y="60" width="34" height="6" rx="3" fill="#E9BE45"/>'

      '<svg viewBox="0 0 32 28" shape-rendering="crispEdges">'

      + '<path d="M5 12h27l-3.5 13H2z" fill="#F8D269" stroke="#16140E" stroke-width="2"/></svg>';

    /* ----- tool icons (flat pixel-friendly SVG) ----- */
    var I = {

      aws:'<svg viewBox="0 0 32 32"><text x="16" y="16" font-family="Arial,Helvetica,sans-serif" font-weight="700" font-size="9" fill="#16140E" text-anchor="middle">aws</text><path d="M7 21c5 3 13 3 18 0" fill="none" stroke="#FF9900" stroke-width="2.2" stroke-linecap="round"/><path d="M23 19.4 25.5 21 24 23.4z" fill="#FF9900"/></svg>',
      git:'<svg viewBox="0 0 32 32"><g fill="none" stroke="#F05133" stroke-width="2.3"><circle cx="9" cy="8" r="3.1"/><circle cx="9" cy="24" r="3.1"/><circle cx="23" cy="11" r="3.1"/></g><path d="M9 11v10M9 18c0-4 4-6 11-6.6" fill="none" stroke="#F05133" stroke-width="2.3"/></svg>',

    };

    /* ----- folder + tool catalogue ----- */
    var FOLDERS = {
      design:{ name:'Design \u0026 Product', glyph:'\u25C6', accent:'var(--orange)', tools:[
        {id:'figma',  n:'Figma',     d:'UI/UX \u0026 prototypes', p:'Fi', i:I.figma,    c:'#F24E1E'},
        {id:'figjam', n:'FigJam',    d:'Whiteboard \u0026 flows',  p:'FJ', i:I.figjam,   c:'#0FA958'},
        {id:'canva',  n:'Canva',     d:'Quick brand visuals',     p:'Cv', i:I.canva,    c:'#1796A0'},
        {id:'react',  n:'React',     d:'Frontend builds',         p:'Re', i:I.react,    c:'#0B7E96'},
        {id:'firebase',n:'Firebase', d:'Auth \u0026 Firestore',   p:'Fb', i:I.firebase, c:'#E07B00'},
        {id:'html',   n:'HTML / CSS',d:'Markup \u0026 styling',   p:'H5', i:I.html,     c:'#E44D26'},
        {id:'js',     n:'JavaScript',d:'Interaction logic',       p:'Js', i:I.js,       c:'#B59700'}
      ]},
      data:{ name:'Data \u0026 Analytics', glyph:'\u2605', accent:'var(--teal)', tools:[
        {id:'sql',    n:'SQL',       d:'Queries \u0026 models',   p:'SQ', i:I.sql,      c:'#1E8C7C'},
        {id:'python', n:'Python',    d:'Cleaning \u0026 scripts', p:'Py', i:I.python,   c:'#2C5E86'},
        {id:'pandas', n:'pandas',    d:'Wrangling datasets',      p:'Pd', i:I.pandas,   c:'#C0046F'},
        {id:'jupyter',n:'Jupyter',   d:'Notebooks \u0026 EDA',    p:'Ju', i:I.jupyter,  c:'#D9620E'},
        {id:'sqlite', n:'SQLite',    d:'Lightweight DBs',         p:'SL', i:I.sqlite,   c:'#0F80CC'},
        {id:'powerbi',n:'Power BI',  d:'Dashboards \u0026 reports',p:'BI',i:I.powerbi,  c:'#B8860B'},
        {id:'office', n:'MS Office', d:'Access, Excel \u0026 docs',p:'MS',i:I.office,   c:'#C24016'}
      ]},
      cloud:{ name:'Cloud \u0026 Foundations', glyph:'\u25B6', accent:'var(--purple)', tools:[
        {id:'aws',  n:'AWS',          d:'Cloud fundamentals',  p:'AW', i:I.aws, c:'#D97A00'},
        {id:'git',  n:'Git / GitHub', d:'Version control',     p:'Gh', i:I.git, c:'#D8402A'},
        {id:'cw',   n:'CodeWhisperer',d:'AI code assist',      p:'CW', i:I.cw,  c:'#B26A00'}
      ]}
    };

    /* paint folder artwork into each desktop folder */
    folderBtns.forEach(function(b){ b.querySelector('[data-art="folder"]').innerHTML = FOLDER_SVG; });
    openEl.querySelector('.dt-open-ico').innerHTML = OPEN_SVG;

    /* ----- clean state machine ----- */
    var state = { folder:null, card:null };
    var currentTools = [];        // tools of the open folder, in order (for arrow nav)
    var lastBtn = null;
    var closeTimer = null;

    function buildCards(folder){
      fanEl.classList.remove('is-fanned');
      deckEl.classList.remove('has-active');
      fanEl.innerHTML = '';
      var n = folder.tools.length;
      var spread = Math.min(n * 9, 56);                  // total fan angle (deg)
      folder.tools.forEach(function(t, idx){
        var rot = n > 1 ? (-spread/2 + spread * (idx/(n-1))) : 0;
        var card = document.createElement('div');
        card.className = 'dt-card';
        card.tabIndex = 0;
        card.dataset.id = t.id;
        card.setAttribute('role','listitem');
        card.setAttribute('aria-label', t.n + ' \u2014 ' + t.d);
        card.style.setProperty('--rot', rot.toFixed(2) + 'deg');
        card.style.setProperty('--i', idx);
        card.style.setProperty('--pc', t.c);
        card.innerHTML =
            '<span class="dt-pip dt-pip-tl"><b>'+t.p+'</b><i>'+folder.glyph+'</i></span>'
          + '<span class="dt-chip">'+t.i+'</span>'
          + '<span class="dt-name">'+t.n+'</span>'
          + '<span class="dt-desc">'+t.d+'</span>'
          + '<span class="dt-pip dt-pip-br"><b>'+t.p+'</b><i>'+folder.glyph+'</i></span>';
        fanEl.appendChild(card);
      });
    }

    /* select / swap the single active card */
    function selectCard(id){
      var cards = fanEl.querySelectorAll('.dt-card');
      cards.forEach(function(c){ c.classList.toggle('is-active', c.dataset.id === id); });
      deckEl.classList.add('has-active');
      state.card = id;
    }
    function deselectCard(){
      var a = fanEl.querySelector('.dt-card.is-active');
      if(a) a.classList.remove('is-active');
      deckEl.classList.remove('has-active');
      state.card = null;
    }

    /* ===== TOOL CARD ARROW NAVIGATION ===== step through tools one by one */
    function nav(dir){
      if(openEl.hidden || !currentTools.length) return;
      var idx = -1;
      for(var k=0; k<currentTools.length; k++){ if(currentTools[k].id === state.card){ idx = k; break; } }
      var next = idx < 0 ? (dir > 0 ? 0 : currentTools.length - 1)
                         : (idx + dir + currentTools.length) % currentTools.length;
      selectCard(currentTools[next].id);
    }

    function openFolder(key, btn){
      var folder = FOLDERS[key];
      if(!folder) return;
      clearTimeout(closeTimer);                  // cancel any pending hide -> reliable re-open
      state.folder = key; state.card = null; lastBtn = btn || null;
      titleEl.textContent = folder.name;
      countEl.textContent = folder.tools.length + ' tools';
      openEl.style.setProperty('--accent', folder.accent);
      // grow from the clicked folder's position for a satisfying "open" feel
      if(btn){
        var sr = screenEl.getBoundingClientRect(), br = btn.getBoundingClientRect();
        openEl.style.transformOrigin =
          (((br.left + br.width/2) - sr.left) / sr.width * 100).toFixed(1) + '% ' +
          (((br.top + br.height/2) - sr.top) / sr.height * 100).toFixed(1) + '%';
      } else { openEl.style.transformOrigin = '50% 50%'; }
      buildCards(folder);
      currentTools = folder.tools;
      document.body.classList.add('dt-zone');    // mute cursor trail while open
      openEl.hidden = false;
      void openEl.offsetWidth;                   // commit initial state so transitions run
      openEl.classList.add('show');
      if(reduce){ fanEl.classList.add('is-fanned'); }
      else { setTimeout(function(){ if(state.folder===key) fanEl.classList.add('is-fanned'); }, 90); }
      closeBtn.focus({preventScroll:true});
    }

    function closeFolder(){
      if(openEl.hidden) return;
      state.folder = null; state.card = null; currentTools = [];
      deckEl.classList.remove('has-active');
      fanEl.classList.remove('is-fanned');
      openEl.classList.remove('show');
      clearTimeout(closeTimer);
      closeTimer = setTimeout(function(){ openEl.hidden = true; }, reduce ? 0 : 360);
      if(lastBtn){ lastBtn.focus({preventScroll:true}); }
    }

    /* ----- wiring ----- */
    folderBtns.forEach(function(b){
      b.addEventListener('click', function(){ openFolder(b.dataset.folder, b); });
    });
    closeBtn.addEventListener('click', closeFolder);
    prevBtn.addEventListener('click', function(){ nav(-1); });
    nextBtn.addEventListener('click', function(){ nav(1); });
    openEl.addEventListener('click', function(e){ if(e.target.hasAttribute('data-close')) closeFolder(); });

    // card click: toggle / swap the single active card
    fanEl.addEventListener('click', function(e){
      var card = e.target.closest('.dt-card'); if(!card) return;
      var id = card.dataset.id;
      if(state.card === id) deselectCard(); else selectCard(id);
    });
    // keyboard: Enter/Space on a focused card selects it
    fanEl.addEventListener('keydown', function(e){
      if(e.key !== 'Enter' && e.key !== ' ') return;
      var card = e.target.closest('.dt-card'); if(!card) return;
      e.preventDefault();
      var id = card.dataset.id;
      if(state.card === id) deselectCard(); else selectCard(id);
    });
    /* ===== TOOL CARD KEYBOARD NAVIGATION ===== arrows browse; Esc clears then closes */
    document.addEventListener('keydown', function(e){
      if(openEl.hidden) return;                          // only while a folder is open
      if(e.key === 'ArrowLeft'){ e.preventDefault(); nav(-1); }
      else if(e.key === 'ArrowRight'){ e.preventDefault(); nav(1); }
      else if(e.key === 'Escape'){
        if(state.card) deselectCard();   // first Esc clears the active card
        else closeFolder();              // second Esc closes the folder
      }
    });

    /* ===== TOOLKIT CURSOR-TRAIL ZONE (temporary, self-restoring) =====
       The trail system keeps running globally; we only TOGGLE a body class by
       zone check. While inside the TV stage (or a folder is open) CSS fades the
       trail layer to opacity:0 — sprites still animate + self-remove, so the
       live-counter stays healthy. The instant the cursor leaves, the class drops
       and the trail resumes normally with no stale state, no gaps, no stall.
       We do NOT stopPropagation, remove sprites, or pause the spawn loop. */
    var stageEl = screenEl.closest('.dt-stage') || screenEl;
    function isInsideToolkitZone(x, y){
      var r = stageEl.getBoundingClientRect();
      return x >= r.left && x <= r.right && y >= r.top && y <= r.bottom;
    }
    window.addEventListener('mousemove', function(e){
      // muted while pointer is in the TV zone OR while a folder is open; else normal
      var mute = isInsideToolkitZone(e.clientX, e.clientY) || !openEl.hidden;
      document.body.classList.toggle('dt-zone', mute);
    }, { passive:true });
  })();
  </script>
